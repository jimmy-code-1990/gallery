<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>即梦生成图库 · Gallery</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0e0e0e; color: #e8e8e8; font-family: -apple-system, 'PingFang SC', sans-serif; }

    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(14,14,14,0.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid #222;
      padding: 14px 24px;
      display: flex; align-items: center; gap: 16px;
    }
    header h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.5px; }
    header span { font-size: 12px; color: #666; }
    .filter-bar { margin-left: auto; display: flex; gap: 8px; }
    .filter-btn {
      padding: 5px 12px; border-radius: 20px; border: 1px solid #333;
      background: transparent; color: #aaa; font-size: 12px; cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn.active, .filter-btn:hover { background: #2a2a2a; color: #fff; border-color: #555; }

    .batch-section { padding: 24px 24px 0; }
    .batch-header {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 16px;
    }
    .batch-tag {
      padding: 3px 10px; border-radius: 4px;
      font-size: 11px; font-weight: 600; letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .batch-title { font-size: 14px; font-weight: 500; }
    .batch-meta { font-size: 12px; color: #555; }
    .batch-prompt {
      background: #141414; border-left: 3px solid #333;
      padding: 10px 14px; border-radius: 0 6px 6px 0;
      font-size: 12px; color: #888; line-height: 1.6;
      margin-bottom: 16px; font-family: monospace;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 8px;
      margin-bottom: 32px;
    }
    .card {
      position: relative; cursor: pointer; overflow: hidden;
      border-radius: 8px; background: #1a1a1a;
      aspect-ratio: auto;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .card:hover { transform: scale(1.02); box-shadow: 0 8px 32px rgba(0,0,0,0.6); }
    .card img {
      width: 100%; height: auto; display: block;
      transition: opacity 0.3s;
    }
    .card img.loading { opacity: 0; }
    .card-num {
      position: absolute; top: 8px; left: 8px;
      background: rgba(0,0,0,0.7); color: #fff;
      font-size: 11px; padding: 2px 7px; border-radius: 10px;
    }
    .card-badge {
      position: absolute; top: 8px; right: 8px;
      font-size: 10px; padding: 2px 7px; border-radius: 10px;
      font-weight: 600;
    }

    /* Lightbox */
    .lightbox {
      display: none; position: fixed; inset: 0; z-index: 999;
      background: rgba(0,0,0,0.92); align-items: center; justify-content: center;
      flex-direction: column; gap: 16px;
    }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 90vw; max-height: 80vh; border-radius: 8px; }
    .lightbox-info { text-align: center; max-width: 600px; }
    .lightbox-info h3 { font-size: 14px; margin-bottom: 8px; }
    .lightbox-info p { font-size: 12px; color: #888; font-family: monospace; line-height: 1.6; }
    .lightbox-close {
      position: fixed; top: 20px; right: 24px;
      background: none; border: none; color: #fff; font-size: 28px; cursor: pointer;
    }
    .lightbox-nav {
      display: flex; gap: 12px;
    }
    .lightbox-nav button {
      padding: 8px 20px; border-radius: 6px;
      background: #222; border: 1px solid #333; color: #ccc;
      cursor: pointer; font-size: 13px;
    }
    .lightbox-nav button:hover { background: #333; }

    .empty { text-align: center; padding: 60px; color: #444; font-size: 14px; }
    hr { border: none; border-top: 1px solid #1e1e1e; margin: 8px 0 24px; }
  </style>
</head>
<body>

<header>
  <h1>🎨 即梦图库</h1>
  <span id="total-count">加载中…</span>
  <div class="filter-bar" id="filter-bar">
    <button class="filter-btn active" onclick="filterBatch('all', this)">全部</button>
  </div>
</header>

<div id="main"></div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="if(event.target===this)closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lb-img" src="" alt="">
  <div class="lightbox-info">
    <h3 id="lb-title"></h3>
    <p id="lb-prompt"></p>
  </div>
  <div class="lightbox-nav">
    <button onclick="lbNav(-1)">← 上一张</button>
    <button onclick="lbNav(1)">下一张 →</button>
  </div>
</div>

<script>
// ──────────────────────────────────────
// 图片数据库：每次 AI 生成新图就追加一批
// ──────────────────────────────────────
const BATCHES = [
  {
    id: "ghost-bride-01",
    title: "鬼新娘角色参考图",
    date: "2026-03-25",
    model: "图片4.0",
    color: "#8b1a1a",
    prompt: `Hyper-realistic Chinese ghost bride portrait, pale white face with cracked skin texture, sunken dark eyes with no pupils, traditional red wedding headdress slightly tilted, hair disheveled, tattered red qipao with black embroidery details, subtle dried blood at corner of lips, ultra-realistic skin texture, cinematic under-lighting, deep shadow contrast, desaturated cold tones, Chinese horror aesthetic, 8K, photorealistic, full body, neutral background`,
    images: [
      { file: "ghost_bride_01.jpg", label: "No.1" },
      { file: "ghost_bride_02.jpg", label: "No.2" },
      { file: "ghost_bride_03.jpg", label: "No.3" },
      { file: "ghost_bride_04.jpg", label: "No.4" },
    ]
  }
  // 后续批次由 AI 自动追加到这里
];

const BASE_URL = "https://git.woa.com/jimmyzhong/Gallery/raw/main/output/";

// ──────────────────────────────────────
let allImages = []; // flat list for lightbox nav
let currentLbIdx = 0;

function render(filter = 'all') {
  const main = document.getElementById('main');
  main.innerHTML = '';
  allImages = [];

  const batches = filter === 'all' ? BATCHES : BATCHES.filter(b => b.id === filter);

  batches.forEach(batch => {
    const section = document.createElement('div');
    section.className = 'batch-section';

    const batchStartIdx = allImages.length;
    batch.images.forEach((img, i) => {
      allImages.push({ ...img, batch, globalIdx: batchStartIdx + i });
    });

    section.innerHTML = `
      <div class="batch-header">
        <span class="batch-tag" style="background:${batch.color}22; color:${batch.color}; border:1px solid ${batch.color}44">${batch.date}</span>
        <span class="batch-title">${batch.title}</span>
        <span class="batch-meta">${batch.model} · ${batch.images.length} 张</span>
      </div>
      <div class="batch-prompt">${batch.prompt}</div>
      <div class="grid" id="grid-${batch.id}"></div>
      <hr>
    `;
    main.appendChild(section);

    const grid = section.querySelector(`#grid-${batch.id}`);
    batch.images.forEach((img, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <img class="loading" src="${BASE_URL}${img.file}" alt="${img.label}"
          onload="this.classList.remove('loading')"
          onerror="this.parentElement.style.display='none'">
        <span class="card-num">${img.label}</span>
      `;
      card.onclick = () => openLightbox(batchStartIdx + i);
      grid.appendChild(card);
    });
  });

  document.getElementById('total-count').textContent = `共 ${allImages.length} 张`;
}

function filterBatch(id, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render(id);
}

function buildFilterBar() {
  const bar = document.getElementById('filter-bar');
  BATCHES.forEach(batch => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = batch.title;
    btn.onclick = function() { filterBatch(batch.id, this); };
    bar.appendChild(btn);
  });
}

function openLightbox(idx) {
  currentLbIdx = idx;
  const item = allImages[idx];
  document.getElementById('lb-img').src = BASE_URL + item.file;
  document.getElementById('lb-title').textContent = `${item.batch.title} · ${item.label}`;
  document.getElementById('lb-prompt').textContent = item.batch.prompt;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

function lbNav(dir) {
  currentLbIdx = (currentLbIdx + dir + allImages.length) % allImages.length;
  openLightbox(currentLbIdx);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowRight') lbNav(1);
  if (e.key === 'ArrowLeft') lbNav(-1);
});

buildFilterBar();
render();
</script>
</body>
</html>
